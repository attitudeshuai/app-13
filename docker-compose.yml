version: '3.8'
services:
  app:
    build: .
    container_name: fridgewatch_app
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=fridgewatch
      - DB_USER=app_user
      - DB_PASSWORD=app_pass
      - Jwt__Key=your-super-secret-key-for-jwt-token-must-be-at-least-32-chars
      - Jwt__Issuer=FridgeWatch
      - Jwt__Audience=FridgeWatchUsers
      - Jwt__ExpiryMinutes=1440
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: fridgewatch_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=fridgewatch
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_pass
    ports:
      - "13308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: fridgewatch_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
